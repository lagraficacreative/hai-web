<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0A0A0F" />
<title>HAI · Tu Human AI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root {
    --bg:#16335F; --surface:#1C3D6C; --surface2:#24487A; --border:#32547F;
    --text:#F7FAFF; --dim:#A7BCD9; --primary:#7C6AF7; --glow:#A78BFA;
    --accent:#22D3EE; --danger:#F87171; --success:#34D399;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  @media(min-width:700px){body{max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}}
  body{background:var(--bg);color:var(--text);font-family:"Manrope",system-ui,sans-serif;
    display:flex;flex-direction:column;overflow:hidden;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}

  header{text-align:center;padding:14px 16px 6px}
  header .logo{font-family:"Manrope";font-weight:700;font-size:17px}
  .grad-text{background:linear-gradient(135deg,#7C6AF7,#22D3EE);-webkit-background-clip:text;background-clip:text;color:transparent}

  /* Avatar */
  .stage{display:flex;flex-direction:column;align-items:center;padding:8px 16px 4px}
  .avatar-ring{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center}
  .ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;transition:all .3s}
  .avatar{width:170px;height:170px;border-radius:50%;overflow:hidden;position:relative;
    background:radial-gradient(circle at 35% 30%,#A78BFA 0%,#7C6AF7 45%,#22D3EE 100%);
    box-shadow:0 0 60px rgba(124,106,247,.45);
    display:flex;align-items:center;justify-content:center;
    font-family:"Manrope";font-weight:700;font-size:56px;color:#fff;
    animation:breathe 4s ease-in-out infinite;will-change:transform}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .listening .ring{border-color:rgba(34,211,238,.7);animation:pulse 1.2s ease-out infinite}
  .thinking .avatar{animation-duration:1s}
  @keyframes pulse{0%{transform:scale(1);opacity:.9}100%{transform:scale(1.28);opacity:0}}
  .persona{margin-top:12px;font-family:"Manrope";font-weight:600;font-size:17px}
  .status{color:var(--dim);font-size:13px;min-height:18px;margin-top:2px;text-align:center}

  /* Chat */
  .chat{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
  .bubble{max-width:84%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.45;
    background:var(--surface2);border:1px solid var(--border);align-self:flex-start;white-space:pre-wrap}
  .bubble.user{background:rgba(124,106,247,.22);border-color:rgba(124,106,247,.4);align-self:flex-end}

  /* Controles */
  .controls{padding:10px 16px calc(14px + env(safe-area-inset-bottom));display:flex;gap:10px;align-items:center;border-top:1px solid var(--border);background:var(--surface)}
  .mic{width:62px;height:62px;border-radius:50%;border:none;flex-shrink:0;cursor:pointer;
    background:linear-gradient(135deg,#7C6AF7,#22D3EE);color:#fff;font-size:26px;
    box-shadow:0 0 26px rgba(124,106,247,.45);transition:all .15s}
  .mic.rec{background:var(--danger);animation:breathe 1s ease-in-out infinite}
  .controls input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;
    color:var(--text);padding:13px 14px;font-size:15px;font-family:inherit}
  .controls input:focus{outline:none;border-color:var(--primary)}
  .send{border:none;background:var(--surface2);color:var(--text);border-radius:12px;padding:13px 16px;font-weight:600;font-size:14px;cursor:pointer;border:1px solid var(--border)}

  /* Config */
  .gear{position:absolute;top:calc(12px + env(safe-area-inset-top));right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--dim)}
  .sheet{position:fixed;inset:0;background:rgba(5,5,10,.7);backdrop-filter:blur(4px);display:none;z-index:40}
  .sheet.open{display:block}
  .sheet-inner{position:absolute;left:0;right:0;bottom:0;max-height:86%;overflow-y:auto;
    background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:22px 18px calc(22px + env(safe-area-inset-bottom))}
  .sheet-inner h2{font-size:17px;margin-bottom:4px}
  .sheet-inner p.sub{color:var(--dim);font-size:12px;margin-bottom:14px}
  .sheet-inner label{display:block;font-size:12px;font-weight:600;margin:12px 0 5px;color:var(--dim)}
  .sheet-inner input,.sheet-inner select,.sheet-inner textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-size:14px;font-family:inherit}
  .sheet-inner textarea{min-height:88px}
  .photo-row{display:flex;gap:10px;align-items:center;margin-top:6px}
  .photo-thumb{width:52px;height:52px;border-radius:50%;background:var(--surface2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px}
  .photo-thumb img{width:100%;height:100%;object-fit:cover}
  .btn-small{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .btn-save{width:100%;margin-top:18px;background:linear-gradient(135deg,#7C6AF7,#22D3EE);border:none;color:#fff;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
  .hint{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.5}
</style>
</head>
<body>

<header>
  <a href="index.html" style="text-decoration:none;color:inherit"><div class="logo"><span class="grad-text">HAI</span> · Tu Human AI</div></a>
</header>
<button class="gear" id="gearBtn" aria-label="Configuración">⚙️</button>

<div class="stage" id="stage">
  <div class="avatar-ring">
    <div class="ring"></div>
    <div class="avatar" id="avatar"><span id="avatarInitial">H</span></div>
  </div>
  <div class="persona" id="personaName">Human AI</div>
  <div class="status" id="status">Toca ⚙️ para configurar y luego pulsa el micrófono</div>
</div>

<div class="chat" id="chat"></div>

<div class="controls">
  <button class="mic" id="micBtn" aria-label="Hablar">🎙️</button>
  <input id="textInput" type="text" placeholder="…o escribe aquí" autocomplete="off" />
  <button class="send" id="sendBtn">➤</button>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <h2>Configuración</h2>
    <p class="sub">Se guarda solo en este teléfono. Puedes borrarlo cuando quieras.</p>
    <label>Nombre del Human AI</label>
    <input id="cfg_name" type="text" placeholder="p. ej. Montse" />
    <label>Su historia y personalidad</label>
    <textarea id="cfg_bio" placeholder="Quién es, cómo habla, qué recuerda, sus anécdotas..."></textarea>
    <label>Fotografía (opcional — el avatar se animará al hablar)</label>
    <div class="photo-row">
      <div class="photo-thumb" id="photoThumb">sin foto</div>
      <button class="btn-small" id="photoBtn">Elegir foto</button>
      <input type="file" id="photoInput" accept="image/*" style="display:none" />
    </div>
    <label>Proveedor de IA</label>
    <select id="cfg_provider">
      <option value="hai">Servidor HAI (sin claves — recomendado)</option>
      <option value="openai">OpenAI (gpt-4o-mini + dictado Whisper)</option>
      <option value="anthropic">Claude (Anthropic)</option>
    </select>
    <label>Clave API del proveedor <small>(no hace falta con Servidor HAI)</small></label>
    <input id="cfg_llmKey" type="password" placeholder="sk-... / sk-ant-..." />
    <label>Clave ElevenLabs (opcional, voz clonada)</label>
    <input id="cfg_xiKey" type="password" placeholder="xi-..." />
    <label>Voice ID de ElevenLabs</label>
    <input id="cfg_voiceId" type="text" placeholder="ID de tu voz clonada" />
    <p class="hint">Sin ElevenLabs usa la voz del navegador. Con tu Voice ID, habla con tu voz real.</p>
    <button class="btn-save" id="saveBtn">Guardar</button>
    <button class="btn-small" id="wipeBtn" style="width:100%;margin-top:10px;color:var(--danger)">Borrar todos los datos de este teléfono</button>
  </div>
</div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const stage = $("stage"), avatar = $("avatar"), status = $("status"), chat = $("chat");
  const micBtn = $("micBtn");
  let cfg = { name: "Human AI", bio: "", provider: "hai", llmKey: "", xiKey: "", voiceId: "", photo: "" };
  let history = [], busy = false, audioCtx = null, currentAudio = null, mediaRec = null;

  // Cerebro en servidor: sin claves si el servidor las tiene configuradas
  const HAI = { chat: false, tts: false };
  fetch("/api/health").then((r) => r.json()).then((h) => { HAI.chat = !!h.chat; HAI.tts = !!h.tts; }).catch(() => {});
  function readyToTalk() {
    if (cfg.provider === "hai") {
      if (!HAI.chat) { setStatus("", "El servidor aún no tiene la IA activada. Elige OpenAI/Claude con tu clave en ⚙️."); return false; }
      return true;
    }
    if (!cfg.llmKey) { setStatus("", "Configura primero tu clave API (⚙️)."); return false; }
    return true;
  }

  // ─── Persistencia local (guardada solo en el dispositivo) ───
  function loadCfg() {
    try { const s = localStorage.getItem("hai_cfg"); if (s) cfg = { ...cfg, ...JSON.parse(s) }; } catch (e) {}
    applyCfg();
  }
  function saveCfg() {
    try { localStorage.setItem("hai_cfg", JSON.stringify(cfg)); } catch (e) {}
  }
  function applyCfg() {
    $("personaName").textContent = cfg.name || "Human AI";
    $("avatarInitial").textContent = (cfg.name || "H").charAt(0).toUpperCase();
    if (cfg.photo) {
      avatar.innerHTML = '<img src="' + cfg.photo + '" alt="" />';
      $("photoThumb").innerHTML = '<img src="' + cfg.photo + '" alt="" />';
    } else {
      avatar.innerHTML = '<span id="avatarInitial">' + (cfg.name || "H").charAt(0).toUpperCase() + "</span>";
    }
  }

  // ─── Config sheet ───
  $("gearBtn").onclick = () => {
    $("cfg_name").value = cfg.name; $("cfg_bio").value = cfg.bio;
    $("cfg_provider").value = cfg.provider; $("cfg_llmKey").value = cfg.llmKey;
    $("cfg_xiKey").value = cfg.xiKey; $("cfg_voiceId").value = cfg.voiceId;
    $("sheet").classList.add("open");
  };
  $("sheet").addEventListener("click", (e) => { if (e.target === $("sheet")) $("sheet").classList.remove("open"); });
  $("saveBtn").onclick = () => {
    cfg.name = $("cfg_name").value.trim() || "Human AI";
    cfg.bio = $("cfg_bio").value;
    cfg.provider = $("cfg_provider").value;
    cfg.llmKey = $("cfg_llmKey").value.trim();
    cfg.xiKey = $("cfg_xiKey").value.trim();
    cfg.voiceId = $("cfg_voiceId").value.trim();
    saveCfg(); applyCfg();
    $("sheet").classList.remove("open");
    setStatus("", "Listo. Pulsa el micrófono y habla con " + cfg.name + ".");
  };
  $("wipeBtn").onclick = () => {
    try { localStorage.removeItem("hai_cfg"); } catch (e) {}
    cfg = { name: "Human AI", bio: "", provider: "hai", llmKey: "", xiKey: "", voiceId: "", photo: "" };
    applyCfg(); $("sheet").classList.remove("open");
  };
  $("photoBtn").onclick = () => $("photoInput").click();
  $("photoInput").onchange = () => {
    const f = $("photoInput").files[0];
    if (!f) return;
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      const s = Math.min(img.width, img.height, 512);
      c.width = c.height = s;
      const side = Math.min(img.width, img.height);
      c.getContext("2d").drawImage(img, (img.width - side) / 2, (img.height - side) / 2, side, side, 0, 0, s, s);
      cfg.photo = c.toDataURL("image/jpeg", 0.82);
      saveCfg(); applyCfg();
    };
    img.src = URL.createObjectURL(f);
  };

  function setStatus(mode, text) {
    stage.className = "stage" + (mode ? " " + mode : "");
    status.textContent = text || "";
  }
  function addBubble(text, user) {
    const b = document.createElement("div");
    b.className = "bubble" + (user ? " user" : "");
    b.textContent = text;
    chat.appendChild(b);
    chat.scrollTop = chat.scrollHeight;
    return b;
  }

  function systemPrompt() {
    return [
      "Eres " + cfg.name + ", un Human AI creado con la plataforma HAI (Human AI Experiences).",
      "Hablas SIEMPRE en español, natural, cercano y BREVE (1-3 frases), porque tus respuestas se leen en voz alta en un móvil.",
      cfg.bio ? "Tu historia y personalidad:\n" + cfg.bio : "",
      "Normas: eres una recreación digital creada con cariño; si te preguntan si eres real, lo explicas con delicadeza. No inventes recuerdos que no estén en tu historia. Nada de consejos médicos o legales.",
    ].filter(Boolean).join("\n\n");
  }

  // ─── Entrada por voz: SpeechRecognition o grabación+Whisper ───
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  micBtn.onclick = async () => {
    if (busy) return;
    if (!readyToTalk()) return;
    stopAudio();
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();

    if (mediaRec && mediaRec.state === "recording") { mediaRec.stop(); return; }

    if (SR) {
      const rec = new SR();
      rec.lang = "es-ES"; rec.interimResults = false; rec.maxAlternatives = 1;
      micBtn.classList.add("rec");
      setStatus("listening", "Te escucho…");
      rec.onresult = (e) => { micBtn.classList.remove("rec"); handleUserText(e.results[0][0].transcript); };
      rec.onerror = (e) => {
        micBtn.classList.remove("rec");
        if (e.error === "not-allowed") setStatus("", "Permite el micrófono en el navegador.");
        else if (cfg.provider === "openai") { startWhisper(); }
        else setStatus("", "No te he oído. Prueba otra vez o escribe.");
      };
      rec.onend = () => micBtn.classList.remove("rec");
      try { rec.start(); } catch (e) { if (cfg.provider === "openai") startWhisper(); }
    } else if (cfg.provider === "openai") {
      startWhisper();
    } else {
      setStatus("", "Este navegador no soporta dictado con Claude. Escribe tu pregunta abajo.");
    }
  };

  async function startWhisper() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4";
      mediaRec = new MediaRecorder(stream, { mimeType: mime });
      const chunks = [];
      mediaRec.ondataavailable = (e) => chunks.push(e.data);
      mediaRec.onstop = async () => {
        stream.getTracks().forEach((t) => t.stop());
        micBtn.classList.remove("rec");
        setStatus("thinking", "Transcribiendo…");
        const blob = new Blob(chunks, { type: mime });
        const form = new FormData();
        form.append("file", blob, mime.includes("webm") ? "audio.webm" : "audio.mp4");
        form.append("model", "whisper-1");
        form.append("language", "es");
        try {
          const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
            method: "POST", headers: { authorization: "Bearer " + cfg.llmKey }, body: form,
          });
          if (!res.ok) throw new Error("whisper " + res.status);
          const data = await res.json();
          if (data.text && data.text.trim()) handleUserText(data.text.trim());
          else setStatus("", "No te he entendido. Prueba otra vez.");
        } catch (e) { setStatus("", "Error transcribiendo. Escribe tu pregunta abajo."); }
      };
      mediaRec.start();
      micBtn.classList.add("rec");
      setStatus("listening", "Grabando… pulsa otra vez para terminar");
    } catch (e) { setStatus("", "Permite el acceso al micrófono."); }
  }

  // ─── Texto ───
  $("sendBtn").onclick = () => { const t = $("textInput").value.trim(); if (t) { $("textInput").value = ""; handleUserText(t); } };
  $("textInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("sendBtn").click(); });

  async function handleUserText(text) {
    if (busy) return;
    if (!readyToTalk()) return;
    busy = true;
    addBubble(text, true);
    setStatus("thinking", cfg.name + " está pensando…");
    history.push({ role: "user", content: text });
    if (history.length > 12) history = history.slice(-12);
    try {
      let reply;
      if (cfg.provider === "hai") {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ persona: systemPrompt(), messages: history }),
        });
        if (!res.ok) throw new Error("hai " + res.status);
        reply = (await res.json()).reply;
      } else if (cfg.provider === "anthropic") {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "content-type": "application/json", "x-api-key": cfg.llmKey,
            "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 250, system: systemPrompt(), messages: history }),
        });
        if (!res.ok) throw new Error("Anthropic " + res.status);
        reply = (await res.json()).content.map((c) => c.text || "").join("");
      } else {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: { "content-type": "application/json", authorization: "Bearer " + cfg.llmKey },
          body: JSON.stringify({ model: "gpt-4o-mini", max_tokens: 250,
            messages: [{ role: "system", content: systemPrompt() }, ...history] }),
        });
        if (!res.ok) throw new Error("OpenAI " + res.status);
        reply = (await res.json()).choices[0].message.content;
      }
      history.push({ role: "assistant", content: reply });
      addBubble(reply, false);
      await speak(reply);
    } catch (err) {
      setStatus("", cfg.provider === "hai" ? "No he podido hablar con el servidor. Prueba de nuevo en un momento." : "Error: revisa la clave API (⚙️).");
    } finally {
      busy = false;
      if (!currentAudio) setStatus("", "Pulsa el micrófono para seguir.");
    }
  }

  // ─── Voz + animación del avatar al ritmo del audio ───
  async function speak(text) {
    setStatus("speaking", cfg.name + " está hablando…");
    if (cfg.xiKey && cfg.voiceId) {
      try {
        const res = await fetch("https://api.elevenlabs.io/v1/text-to-speech/" + cfg.voiceId, {
          method: "POST",
          headers: { "content-type": "application/json", "xi-api-key": cfg.xiKey },
          body: JSON.stringify({ text, model_id: "eleven_multilingual_v2",
            voice_settings: { stability: 0.5, similarity_boost: 0.8 } }),
        });
        if (!res.ok) throw new Error("11labs " + res.status);
        const blob = await res.blob();
        await playAnimated(URL.createObjectURL(blob));
        setStatus("", "Pulsa el micrófono para seguir.");
        return;
      } catch (e) { /* cae a voz del navegador */ }
    }
    if (HAI.tts) {
      try {
        const res = await fetch("/api/tts", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) throw new Error("hai-tts " + res.status);
        const blob = await res.blob();
        await playAnimated(URL.createObjectURL(blob));
        setStatus("", "Pulsa el micrófono para seguir.");
        return;
      } catch (e) { /* cae a voz del navegador */ }
    }
    await new Promise((resolve) => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "es-ES";
      const es = window.speechSynthesis.getVoices().find((v) => v.lang.startsWith("es"));
      if (es) u.voice = es;
      // animación básica sin análisis de audio
      const t = setInterval(() => { avatar.style.transform = "scale(" + (1 + Math.random() * 0.06) + ")"; }, 120);
      u.onend = u.onerror = () => { clearInterval(t); avatar.style.transform = ""; resolve(); };
      window.speechSynthesis.speak(u);
    });
    setStatus("", "Pulsa el micrófono para seguir.");
  }

  function playAnimated(url) {
    return new Promise((resolve) => {
      currentAudio = new Audio(url);
      let raf;
      try {
        if (audioCtx) {
          const src = audioCtx.createMediaElementSource(currentAudio);
          const analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          src.connect(analyser); analyser.connect(audioCtx.destination);
          const buf = new Uint8Array(analyser.frequencyBinCount);
          const tick = () => {
            analyser.getByteFrequencyData(buf);
            let sum = 0; for (let i = 2; i < 40; i++) sum += buf[i];
            const level = sum / 38 / 255; // 0..1
            avatar.style.transform = "scale(" + (1 + level * 0.12) + ") translateY(" + (-level * 4) + "px)";
            avatar.style.boxShadow = "0 0 " + (60 + level * 70) + "px rgba(34,211,238," + (0.35 + level * 0.5) + ")";
            raf = requestAnimationFrame(tick);
          };
          tick();
        }
      } catch (e) { /* sin análisis, reproduce igual */ }
      const done = () => { cancelAnimationFrame(raf); avatar.style.transform = ""; avatar.style.boxShadow = ""; currentAudio = null; resolve(); };
      currentAudio.onended = done; currentAudio.onerror = done;
      currentAudio.play().catch(done);
    });
  }

  function stopAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    window.speechSynthesis.cancel();
    avatar.style.transform = ""; avatar.style.boxShadow = "";
  }

  loadCfg();
  if (cfg.llmKey) setStatus("", "Pulsa el micrófono y habla con " + cfg.name + ".");
})();
</script>
</body>
</html>
