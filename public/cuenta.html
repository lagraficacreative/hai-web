<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HAI · Tu cuenta</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#16335F; --surface:#1C3D6C; --surface2:#24487A; --border:#32547F;
    --text:#F7FAFF; --dim:#A7BCD9; --primary:#7C6AF7; --accent:#22D3EE; --danger:#F87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"Manrope",system-ui,sans-serif;line-height:1.55;min-height:100vh;display:flex;flex-direction:column}
  h1{font-family:"Manrope",sans-serif;letter-spacing:-.02em}
  a{color:inherit;text-decoration:none}
  .grad-text{background:linear-gradient(135deg,#7C6AF7,#22D3EE);-webkit-background-clip:text;background-clip:text;color:transparent}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
  .logo{font-family:"Manrope";font-weight:700;font-size:18px}
  header a.back{color:var(--dim);font-size:13px}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:min(420px,94vw);background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px}
  h1{font-size:22px;text-align:center}
  .sub{color:var(--dim);font-size:13px;text-align:center;margin-top:6px}
  .tabs{display:flex;gap:8px;margin:20px 0 8px;background:var(--bg);border-radius:10px;padding:4px}
  .tabs button{flex:1;border:none;background:transparent;color:var(--dim);font-family:inherit;font-size:14px;font-weight:600;padding:9px;border-radius:8px;cursor:pointer}
  .tabs button.active{background:var(--surface2);color:var(--text)}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;font-size:14px;font-family:inherit}
  input:focus{outline:none;border-color:var(--primary)}
  .btn{width:100%;margin-top:20px;border:none;cursor:pointer;font-family:"Manrope";font-weight:600;font-size:15px;border-radius:10px;padding:13px;background:linear-gradient(135deg,#7C6AF7,#22D3EE);color:#fff}
  .btn:hover{filter:brightness(1.08)}
  .msg{margin-top:14px;font-size:13px;text-align:center;color:var(--danger);min-height:18px}
  .hint{color:var(--dim);font-size:12px;margin-top:14px;text-align:center}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="grad-text">HAI</span> Memories</div>
  <a class="back" href="memories.html">← Volver a HAI Memories</a>
</header>

<main>
  <div class="card">
    <h1>Tu espacio en <span class="grad-text">HAI</span></h1>
    <p class="sub">Crea tu cuenta para guardar tu Human AI y conversar con él en privado.</p>
    <div class="tabs">
      <button id="tabLogin" class="active">Entrar</button>
      <button id="tabRegister">Crear cuenta</button>
    </div>
    <form id="form">
      <div id="nameField" style="display:none">
        <label>Tu nombre</label>
        <input id="f_name" type="text" autocomplete="name" placeholder="p. ej. Montse" />
      </div>
      <label>Email</label>
      <input id="f_email" type="email" autocomplete="email" placeholder="tu@email.com" required />
      <label>Contraseña <small style="color:var(--dim);font-weight:400">(mínimo 8 caracteres)</small></label>
      <input id="f_password" type="password" autocomplete="current-password" minlength="8" required />
      <div id="privField" style="display:none;margin-top:14px">
        <label style="display:flex;gap:9px;align-items:flex-start;font-weight:400;font-size:12.5px;color:var(--dim);margin:0">
          <input id="f_priv" type="checkbox" style="width:auto;margin-top:2px;accent-color:#7C6AF7" />
          <span>He leído y acepto la <a href="privacidad.html" target="_blank" style="color:var(--accent);text-decoration:underline">política de privacidad</a>.</span>
        </label>
      </div>
      <button class="btn" id="submitBtn" type="submit">Entrar</button>
      <div class="msg" id="msg"></div>
    </form>
    <p class="hint">Tus datos se guardan cifrados y son solo tuyos. Puedes borrarlos cuando quieras escribiendo a lagraficacreative@gmail.com.</p>
  </div>
</main>

<script>
(function () {
  let mode = "login";
  const $ = (id) => document.getElementById(id);
  const ALLOWED_NEXT = ["mi-avatar.html", "cuestionario.html", "admin.html"];
  const nextParam = new URLSearchParams(location.search).get("next");
  const dest = ALLOWED_NEXT.includes(nextParam) ? nextParam : "mi-avatar.html";
  function setMode(m) {
    mode = m;
    $("tabLogin").classList.toggle("active", m === "login");
    $("tabRegister").classList.toggle("active", m === "register");
    $("nameField").style.display = m === "register" ? "block" : "none";
    $("privField").style.display = m === "register" ? "block" : "none";
    $("submitBtn").textContent = m === "login" ? "Entrar" : "Crear mi cuenta";
    $("f_password").autocomplete = m === "login" ? "current-password" : "new-password";
    $("msg").textContent = "";
  }
  $("tabLogin").onclick = () => setMode("login");
  $("tabRegister").onclick = () => setMode("register");

  fetch("/api/auth/me").then((r) => { if (r.ok) location.href = dest; });

  $("form").onsubmit = async (e) => {
    e.preventDefault();
    $("msg").textContent = "";
    const body = { email: $("f_email").value.trim(), password: $("f_password").value };
    if (mode === "register") {
      body.name = $("f_name").value.trim();
      if (!$("f_priv").checked) { $("msg").textContent = "Para crear la cuenta, acepta la política de privacidad."; return; }
    }
    try {
      const r = await fetch("/api/auth/" + mode, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      if (r.ok) { location.href = dest; return; }
      const err = (await r.json()).error || "";
      $("msg").textContent =
        err === "email_ya_registrado" ? "Ese email ya tiene cuenta. Prueba a entrar." :
        err === "credenciales_invalidas" ? "Email o contraseña incorrectos." :
        err === "password_corta" ? "La contraseña necesita al menos 8 caracteres." :
        err === "email_invalido" ? "Revisa el email." :
        "No se ha podido completar. Prueba de nuevo.";
    } catch (e2) {
      $("msg").textContent = "Error de conexión. Prueba de nuevo.";
    }
  };
})();
</script>
</body>
</html>
