<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HAI · Mi Human AI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0A0A0F; --surface:#12121A; --surface2:#1A1A26; --border:#26263A;
    --text:#F4F4F8; --dim:#9A9AB0; --primary:#7C6AF7; --accent:#22D3EE; --success:#34D399; --danger:#F87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;line-height:1.55;min-height:100vh;display:flex;flex-direction:column}
  h1,h2{font-family:"Sora",sans-serif;letter-spacing:-.02em}
  a{color:inherit;text-decoration:none}
  .grad-text{background:linear-gradient(135deg,#7C6AF7,#22D3EE);-webkit-background-clip:text;background-clip:text;color:transparent}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
  .logo{font-family:"Sora";font-weight:700;font-size:18px}
  .head-actions{display:flex;gap:14px;align-items:center;color:var(--dim);font-size:13px}
  .head-actions button{background:none;border:none;color:var(--dim);font-family:inherit;font-size:13px;cursor:pointer}
  .head-actions button:hover, .head-actions a:hover{color:var(--text)}
  main{flex:1;width:min(680px,100%);margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:16px}
  .persona{display:flex;align-items:center;gap:14px}
  .avatar{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#A78BFA,#7C6AF7 55%,#22D3EE);display:flex;align-items:center;justify-content:center;font-family:"Sora";font-size:26px;font-weight:700;overflow:hidden;flex-shrink:0;transition:transform .12s}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .persona h1{font-size:22px}
  .persona .state{color:var(--dim);font-size:13px;min-height:18px}
  .chat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .chat-log{height:44vh;min-height:260px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .bubble{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;background:var(--surface2);align-self:flex-start;white-space:pre-wrap}
  .bubble.user{background:linear-gradient(135deg,rgba(124,106,247,.35),rgba(34,211,238,.25));align-self:flex-end}
  .chat-input{display:flex;gap:8px;border-top:1px solid var(--border);padding:12px}
  .chat-input input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;font-size:14px;font-family:inherit}
  .chat-input input:focus{outline:none;border-color:var(--primary)}
  .btn{border:none;cursor:pointer;font-family:"Inter";font-weight:600;font-size:14px;border-radius:10px;padding:11px 18px;background:linear-gradient(135deg,#7C6AF7,#22D3EE);color:#fff}
  .btn:hover{filter:brightness(1.08)}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  details{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
  summary{cursor:pointer;font-weight:600;font-size:15px;font-family:"Sora"}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  label small{color:var(--dim);font-weight:400}
  input[type=text],textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;font-size:14px;font-family:inherit}
  textarea{min-height:140px;resize:vertical}
  input:focus,textarea:focus{outline:none;border-color:var(--primary)}
  .photo-row{display:flex;gap:12px;align-items:center;margin-top:6px}
  .photo-thumb{width:52px;height:52px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim);overflow:hidden}
  .photo-thumb img{width:100%;height:100%;object-fit:cover}
  .saved{color:var(--success);font-size:13px;margin-left:12px}
  .hint{color:var(--dim);font-size:12px;margin-top:6px;line-height:1.5}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="grad-text">HAI</span> Memories</div>
  <div class="head-actions">
    <a href="memories.html">HAI Memories</a>
    <span id="userName"></span>
    <button id="logoutBtn">Salir</button>
  </div>
</header>

<main>
  <div class="persona">
    <div class="avatar" id="avatar"><span id="avatarInitial">H</span></div>
    <div>
      <h1 id="humanName">Mi Human AI</h1>
      <div class="state" id="state">Cargando…</div>
    </div>
  </div>

  <div class="chat-card">
    <div class="chat-log" id="chatLog"></div>
    <div class="chat-input">
      <input id="chatInput" type="text" placeholder="Escríbele…" />
      <button class="btn btn-ghost" id="voiceToggle" title="Voz">🔊</button>
      <button class="btn" id="chatSend">Enviar</button>
    </div>
  </div>

  <a class="btn btn-ghost" href="cuestionario.html" style="text-align:center">📔 Cuestionario de recuerdos — responde y sube fotos, vídeos y audios</a>

  <details id="settings">
    <summary>⚙️ Editar mi Human AI</summary>
    <label>Su nombre</label>
    <input id="f_name" type="text" placeholder="p. ej. la iaia María" />
    <label>Su historia y personalidad <small>(quién es, cómo habla, sus anécdotas, sus muletillas…)</small></label>
    <textarea id="f_bio" placeholder="Nació en… Trabajó de… Siempre decía… Le encantaba…"></textarea>
    <label>Fotografía <small>(opcional)</small></label>
    <div class="photo-row">
      <div class="photo-thumb" id="photoThumb">sin foto</div>
      <button class="btn btn-ghost" id="photoBtn" type="button">Elegir foto</button>
      <input type="file" id="photoInput" accept="image/*" style="display:none" />
    </div>
    <label>Voice ID de ElevenLabs <small>(opcional — su voz clonada; sin él usa la voz general)</small></label>
    <input id="f_voiceId" type="text" placeholder="p. ej. pNInz6obpgDQGcFmaJgB" />
    <p class="hint">Cuanto más rica sea la historia, más se parecerá a la persona. Puedes editarla siempre que quieras.</p>
    <p style="margin-top:16px"><button class="btn" id="saveBtn" type="button">Guardar</button><span class="saved" id="savedMsg"></span></p>
  </details>
</main>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  let human = { name: "Mi Human AI", bio: "", photo: "", voice_id: "" };
  let voiceOn = true, busy = false, health = { chat: false, tts: false };

  function addBubble(text, user) {
    const b = document.createElement("div");
    b.className = "bubble" + (user ? " user" : "");
    b.textContent = text;
    $("chatLog").appendChild(b);
    $("chatLog").scrollTop = $("chatLog").scrollHeight;
    return b;
  }
  function applyHuman() {
    $("humanName").textContent = human.name || "Mi Human AI";
    $("f_name").value = human.name || "";
    $("f_bio").value = human.bio || "";
    $("f_voiceId").value = human.voice_id || "";
    const initial = (human.name || "H").charAt(0).toUpperCase();
    if (human.photo) {
      $("avatar").innerHTML = '<img src="' + human.photo + '" alt="" />';
      $("photoThumb").innerHTML = '<img src="' + human.photo + '" alt="" />';
    } else {
      $("avatar").innerHTML = '<span id="avatarInitial">' + initial + "</span>";
      $("photoThumb").textContent = "sin foto";
    }
  }

  async function init() {
    const me = await fetch("/api/auth/me");
    if (!me.ok) { location.href = "cuenta.html"; return; }
    const { user } = await me.json();
    $("userName").textContent = user.name || user.email;

    health = await fetch("/api/health").then((r) => r.json()).catch(() => health);
    const h = await fetch("/api/human").then((r) => r.json());
    human = h.human;
    applyHuman();

    const msgs = await fetch("/api/human/messages").then((r) => r.json()).catch(() => ({ messages: [] }));
    msgs.messages.forEach((m) => addBubble(m.content, m.role === "user"));

    if (!health.chat) {
      $("state").textContent = "El chat con IA aún no está activado en el servidor.";
    } else if (!human.bio) {
      $("state").textContent = "Empieza por ⚙️ Editar: cuéntale quién es.";
    } else {
      $("state").textContent = "Listo para conversar.";
    }
  }

  $("logoutBtn").onclick = async () => {
    await fetch("/api/auth/logout", { method: "POST" });
    location.href = "cuenta.html";
  };

  $("photoBtn").onclick = () => $("photoInput").click();
  $("photoInput").onchange = () => {
    const f = $("photoInput").files[0];
    if (!f) return;
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      const s = Math.min(img.width, img.height, 512);
      c.width = c.height = s;
      const side = Math.min(img.width, img.height);
      c.getContext("2d").drawImage(img, (img.width - side) / 2, (img.height - side) / 2, side, side, 0, 0, s, s);
      human.photo = c.toDataURL("image/jpeg", 0.82);
      applyHuman();
    };
    img.src = URL.createObjectURL(f);
  };

  $("saveBtn").onclick = async () => {
    human.name = $("f_name").value.trim() || "Mi Human AI";
    human.bio = $("f_bio").value;
    human.voice_id = $("f_voiceId").value.trim();
    const r = await fetch("/api/human", {
      method: "PUT",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ name: human.name, bio: human.bio, photo: human.photo, voiceId: human.voice_id }),
    });
    $("savedMsg").textContent = r.ok ? "✓ Guardado" : "No se pudo guardar";
    setTimeout(() => { $("savedMsg").textContent = ""; }, 2500);
    applyHuman();
    if (health.chat && human.bio) $("state").textContent = "Listo para conversar.";
  };

  async function speak(text) {
    if (!voiceOn) return;
    try {
      const r = await fetch("/api/human/tts", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ text }),
      });
      if (!r.ok) return;
      const audio = new Audio(URL.createObjectURL(await r.blob()));
      const t = setInterval(() => { $("avatar").style.transform = "scale(" + (1 + Math.random() * 0.06) + ")"; }, 120);
      audio.onended = audio.onerror = () => { clearInterval(t); $("avatar").style.transform = ""; };
      audio.play().catch(() => { clearInterval(t); $("avatar").style.transform = ""; });
    } catch (e) {}
  }

  async function send() {
    const text = $("chatInput").value.trim();
    if (!text || busy) return;
    if (!health.chat) { $("state").textContent = "El chat con IA aún no está activado en el servidor."; return; }
    busy = true;
    $("chatInput").value = "";
    addBubble(text, true);
    $("state").textContent = (human.name || "Tu Human AI") + " está pensando…";
    try {
      const r = await fetch("/api/human/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ text }),
      });
      if (!r.ok) throw new Error("chat " + r.status);
      const { reply } = await r.json();
      addBubble(reply, false);
      speak(reply);
      $("state").textContent = "";
    } catch (e) {
      $("state").textContent = "No he podido responder. Prueba de nuevo en un momento.";
    } finally {
      busy = false;
    }
  }

  $("chatSend").onclick = send;
  $("chatInput").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
  $("voiceToggle").onclick = () => {
    voiceOn = !voiceOn;
    $("voiceToggle").textContent = voiceOn ? "🔊" : "🔇";
  };

  init();
})();
</script>
</body>
</html>
